<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Convite Especial</title>
  <style>
    body {
      background: #fce4ec;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    .convite {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }
    h1 {
      color: #e91e63;
    }
  </style>
</head>
<body>
  <div class="convite">
    <h1>🎉 Você está convidado! 🎉</h1>
    <p><strong>Evento:</strong> Aniversário da Maria</p>
    <p><strong>Data:</strong> 10 de Março</p>
    <p><strong>Horário:</strong> 18h</p>
    <p><strong>Local:</strong> Rua das Flores, 123</p>
    <p>Esperamos você 💖</p>
  </div>
</body>
</html>
